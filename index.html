// ── ユーティリティ ──
function ymd(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function pad(n){ return String(n).padStart(2,"0"); }
function todayStr(){ return ymd(new Date()); }
function dowJP(dateStr){ return DAYS[(new Date(dateStr).getDay()+6)%7]; }
function mmdd(dateStr){ var d=new Date(dateStr); return (d.getMonth()+1)+"/"+d.getDate(); }
function el(tag, attrs, children){
  var e=document.createElement(tag);
  if(attrs) for(var k in attrs){
    if(k==="style") e.style.cssText=attrs[k];
    else if(k==="class") e.className=attrs[k];
    else if(k.slice(0,2)==="on") e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if(k==="html") e.innerHTML=attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  if(children!=null){
    if(!Array.isArray(children)) children=[children];
    children.forEach(function(c){ if(c==null||c===false) return; e.appendChild(typeof c==="object"?c:document.createTextNode(String(c))); });
  }
  return e;
}

// ── 保存 / 読込 ──
function load(){
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return JSON.parse(JSON.stringify(initialData));
    var p=JSON.parse(raw);
    return {
      sessions: p.sessions||[], students: p.students||[],
      otherEvents: p.otherEvents||[], requests: p.requests||[],
      manualIncome: p.manualIncome||{},
      manualNet: p.manualNet||{},
      unavailable: p.unavailable||[],
      templates: p.templates||[],
      lastBackup: p.lastBackup||null
    };
  }catch(e){ return JSON.parse(JSON.stringify(initialData)); }
}
function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(S.data)); }catch(e){}
}
function newId(arr){ return arr.reduce(function(m,x){return Math.max(m,x.id||0);},0)+1; }

// ── 計算ロジック ──
function studentById(id){ return S.data.students.find(function(s){return s.id===id;}); }
function getRate(student){ return student && student.type==="outside" ? RATE_OUTSIDE : RATE_INSIDE; }
function durationH(start,end){
  var a=start.split(":"), b=end.split(":");
  var mins=(parseInt(b[0])*60+parseInt(b[1]))-(parseInt(a[0])*60+parseInt(a[1]));
  return Math.max(0, mins/60);
}
function calcIncome(s){
  if(s.deputized) return 0;
  if(s.kind==="meeting") return 0;
  if(s.kind==="fixed") return s.fixedAmount||0;
  var rate = s.snapshotRate!=null ? s.snapshotRate : (s.kind==="ta" ? RATE_TA : getRate(studentById(s.studentId)));
  return Math.round(durationH(s.startTime,s.endTime)*rate);
}
function sessionInfo(s){
  if(s.kind==="ta") return { name:"TA業務", color:"#0ea5e9" };
  if(s.kind==="fixed") return { name:(s.note||"固定報酬"), color:"#a855f7" };
  if(s.kind==="meeting") return { name:(s.note||"面談"), color:"#14b8a6" };
  var st=studentById(s.studentId);
  if(st) return { name:st.name, color:st.color };
  // 生徒なしの代理：入力した生徒名を表示（なければ「代理」）
  return { name:(s.depName && s.depName.trim() ? s.depName : "代理"), color:"#9ca3af" };
}
function isShiftEligible(student, session){
  if(!student||!student.leader) return false;
  if(!student.leaderUntil) return true;
  return session.date.slice(0,7) <= student.leaderUntil;
}
function shiftFeeForStudent(studentId){
  var st=studentById(studentId);
  if(!st||!st.leader) return {count:0,fee:0};
  var c=S.data.sessions.filter(function(s){return s.studentId===studentId && isShiftEligible(st,s);}).length;
  return {count:c, fee:c*SHIFT_FEE};
}
function shiftFeeForMonth(year,month){
  var ym=year+"-"+pad(month), c=0;
  S.data.sessions.forEach(function(s){
    if(s.date.slice(0,7)!==ym) return;
    if(isShiftEligible(studentById(s.studentId), s)) c++;
  });
  return {count:c, fee:c*SHIFT_FEE};
}
function autoIncomeFor(year,month){
  return S.data.sessions.reduce(function(sum,s){
    if(parseInt(s.date.slice(0,4))===year && parseInt(s.date.slice(5,7))===month) return sum+calcIncome(s);
    return sum;
  },0);
}
function monthKey(y,m){ return y+"-"+pad(m); }
function displayIncomeFor(y,m){
  var k=monthKey(y,m);
  return S.data.manualIncome[k]!=null ? S.data.manualIncome[k] : autoIncomeFor(y,m);
}
function isManual(y,m){ return S.data.manualIncome[monthKey(y,m)]!=null; }
// 受け取った額（手取り・手動入力）。支給月ベースのキーで保持
// 勤務月→支給月（翌月）
function payMonthOf(wy,wm){ return wm===12?{year:wy+1,month:1}:{year:wy,month:wm+1}; }
// 受け取った額（手取り）。キーは「支給月」。引数は勤務月(y,m)なので支給月に変換して参照
function netFor(y,m){ var p=payMonthOf(y,m); var k=monthKey(p.year,p.month); return S.data.manualNet[k]!=null ? S.data.manualNet[k] : null; }
function hasNet(y,m){ var p=payMonthOf(y,m); return S.data.manualNet[monthKey(p.year,p.month)]!=null; }
// 支給月キーで直接参照（年間集計用）
function netByPayMonth(py,pm){ var k=monthKey(py,pm); return S.data.manualNet[k]!=null?S.data.manualNet[k]:null; }
function hasNetByPayMonth(py,pm){ return S.data.manualNet[monthKey(py,pm)]!=null; }
function workMonthFor(py,pm){ return pm===1?{year:py-1,month:12}:{year:py,month:pm-1}; }
function paidIncomeFor(py,pm){
  var w=workMonthFor(py,pm);
  return displayIncomeFor(w.year,w.month)+shiftFeeForMonth(w.year,w.month).fee;
}
function weekDates(base){
  var d=new Date(base), out=[];
  for(var i=0;i<7;i++){ var nd=new Date(d); nd.setDate(d.getDate()+i); out.push(ymd(nd)); }
  return out;
}
function sortDaySessions(arr){
  return arr.slice().sort(function(a,b){
    if(!!a.deputized!==!!b.deputized) return a.deputized?1:-1;
    return a.startTime.localeCompare(b.startTime);
  });
}
function requestProgress(r){
  var slots=r.slots||[];
  var done=slots.filter(function(s){return s.status==="mine"||s.status==="deputized";}).length;
  return { done:done, total:slots.length, allDone: slots.length>0 && done===slots.length };
}
// バイト不可情報（その日）
function unavailFor(date){ return S.data.unavailable.filter(function(u){return u.date===date;}); }
// その日の枠の状態: "full"=終日不可(赤) / "partial"=時間帯不可(黄) / null
function dayAvailStatus(date){
  var u=unavailFor(date);
  if(u.length===0) return null;
  if(u.some(function(x){return x.allDay;})) return "full";
  return "partial";
}

// バックアップが2週間以上前（または一度もない）ならtrue
function backupOverdue(){
  if(!S.data || !S.data.lastBackup) return true;
  var last=new Date(S.data.lastBackup).getTime();
  return (Date.now()-last) > 14*24*60*60*1000;
}

function attachSwipe(node, onPrev, onNext){
  var sx=0, sy=0;
  node.addEventListener("touchstart", function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; });
  node.addEventListener("touchend", function(e){
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){ dx>0?onPrev():onNext(); }
  });
}

  ]);

  DAYS.forEach(function(d){ dow.appendChild(el("div",{style:"text-align:center;font-size:11px;color:#9ca3af;font-weight:700;"},[d])); });
  // ヘッダー（月ナビ+今日+曜日）をスクロールしても上部に固定
  var sticky=el("div",{style:"position:sticky;top:0;background:#f5f6fa;z-index:5;"},[head,dow]);

  // 連続表示: 前月の1日を含む週の月曜 〜 2ヶ月後の月末を含む週の日曜（前月へもスクロールで戻れる）
  var startD=new Date(y, m-2, 1);
  var sdow=startD.getDay(); startD.setDate(startD.getDate() - (sdow===0?6:sdow-1)); // 月曜へ
  var endD=new Date(y, m-1+3, 0); // 2ヶ月後の末日
  var edow=endD.getDay(); endD.setDate(endD.getDate() + (edow===0?0:7-edow)); // 日曜へ

  var wrap=el("div",{});
  wrap.appendChild(sticky);

  var cur=new Date(startD);
  var weekDays=[];
  var lastSepMonth=null; // 直近に表示したセパレーターの月（跨ぎ日判定用）
  var todayAnchor=null;
  var curMonthAnchor=null; // 表示月のセパレーター（初期スクロール先）
  while(cur<=endD){
    weekDays.push(new Date(cur));
    if(weekDays.length===7){
      var firstOfMonth=weekDays.find(function(d){return d.getDate()===1;});
      if(firstOfMonth){
        lastSepMonth=firstOfMonth.getMonth();
        var sep=el("div",{style:"display:flex;align-items:center;gap:10px;margin:14px 0 6px;"},[
          el("div",{style:"flex:1;height:2px;background:#c7d2fe;"}),

          el("div",{style:"flex:1;height:2px;background:#c7d2fe;"})
        ]);
        if(firstOfMonth.getFullYear()===y && firstOfMonth.getMonth()===m-1) curMonthAnchor=sep;
        wrap.appendChild(sep);
      }
      var row=el("div",{style:"display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;"});
      var sepM=lastSepMonth;
      weekDays.forEach(function(d){
        var cell=monthDayCell(d, sepM);
        if(ymd(d)===todayStr()) todayAnchor=cell;
        row.appendChild(cell);
      });
      wrap.appendChild(row);
      weekDays=[];
    }
    cur.setDate(cur.getDate()+1);
  }
  // 初期表示: 月タブを開いたときは「今月」の見出しが上に来る位置へ（前月は上スクロールで見える）
  if(S._monthOpenPending){
    S._monthOpenPending=false;
    setTimeout(function(){
      if(curMonthAnchor && curMonthAnchor.scrollIntoView){ curMonthAnchor.scrollIntoView({block:"start"}); window.scrollBy(0,-90); }
    }, 0);
  }
  // 「今日」ボタン時は今日のマスへ
  if(S._monthScrollPending){
    S._monthScrollPending=false;
    setTimeout(function(){
      if(todayAnchor && todayAnchor.scrollIntoView){ todayAnchor.scrollIntoView({block:"center"}); }
    }, 0);
  }

// 今日に戻る（週・月共通）
function goToday(){
  var now=new Date();

function shiftMonth(dir){
  var m=S.currentMonth.month+dir, y=S.currentMonth.year;

function saveSession(v, isNew){
  // 自分が代理で入る（生徒名を自由入力／自分が教える→給料あり・通常表示）
  var isCovering = (v.kind==="tutor" && (v.studentId===""||v.studentId==null));
  var rate;
  if(v.kind==="ta") rate=RATE_TA;
  else if(v.kind==="fixed") rate=0;
  else if(v.kind==="meeting") rate=0;
  else if(isCovering){ rate=(v.subType==="inside")?RATE_INSIDE:RATE_OUTSIDE; }
  else { rate=getRate(studentById(parseInt(v.studentId))); }
  var rec={
    id: isNew?newId(S.data.sessions):v.id,
    studentId: (v.kind==="tutor" && v.studentId!=="" && v.studentId!=null)?parseInt(v.studentId):null,
    date:v.date, startTime:v.startTime, endTime:v.endTime,
    // 「代わってもらう」= 生徒ありでチェックを入れたときだけ給料0・薄色。
    // 「自分が代理で入る」(生徒なし) は自分が教えるので給料あり・通常表示。
    deputized: (v.kind==="tutor" && !isCovering) ? !!v.deputized : false,
    depName: isCovering ? (v.depName||"") : "",
    subType: isCovering ? (v.subType||"outside") : undefined,
    note:v.note||"", kind:v.kind, snapshotRate:rate, fixedAmount:v.fixedAmount||0
  };
  if(isNew) S.data.sessions.push(rec);
  else S.data.sessions=S.data.sessions.map(function(x){return x.id===rec.id?rec:x;});
  // テンプレート登録（日付を除いた内容を保存）
  if(v._saveTpl){
    S.data.templates.push({
      kind:rec.kind, studentId:rec.studentId, depName:rec.depName||"", subType:rec.subType||"outside",
      startTime:rec.startTime, endTime:rec.endTime, note:rec.note||"", fixedAmount:rec.fixedAmount||0
    });
  }
  save(); closeModal();
}

function openRequestEdit(request){
  var isNew=!request;
  var v=request?JSON.parse(JSON.stringify(request)):{ id:null, studentId:null, studentName:"", candidateDates:[], note:"", slots:[{status:"open",confirmedDate:""}] };

    var body=[];
    // 生徒: 在籍生徒から選択 or 自由入力（新規・他の先生の生徒）
    var stSel=el("select",{style:ST.input,onchange:function(e){
      v.studentId = e.target.value===""?null:parseInt(e.target.value);
      if(v.studentId!=null){ var st=studentById(v.studentId); if(st) v.studentName=st.name; }
      build();
    }});
    var optFree=el("option",{value:""},["（下に自由入力）"]); if(v.studentId==null)optFree.selected=true; stSel.appendChild(optFree);
    S.data.students.filter(function(s){return !s.retired;}).forEach(function(s){
      var o=el("option",{value:String(s.id)},[s.name+(s.leader?"（リーダー）":"")]); if(v.studentId===s.id)o.selected=true; stSel.appendChild(o);
    });
    body.push(field("生徒（在籍生徒から選択）", stSel));
    if(v.studentId==null){
      body.push(field("生徒名（自由入力）", el("input",{value:v.studentName,style:ST.input,placeholder:"例: 佐藤さん",oninput:function(e){ v.studentName=e.target.value; }})));
    }
    // ミニカレンダー
    body.push(el("label",{style:ST.label},["候補日（タップで選択／取り消し）"]));
    var firstDay=new Date(pickerMonth.year,pickerMonth.month-1,1).getDay();
    var off=firstDay===0?6:firstDay-1, dim=new Date(pickerMonth.year,pickerMonth.month,0).getDate();
    var cells=[]; for(var i=0;i<off;i++) cells.push(null);
    for(var d=1;d<=dim;d++) cells.push(d);
    while(cells.length%7!==0) cells.push(null);
    var selDates=v.candidateDates.map(function(c){return c.date;});
    var cal=el("div",{style:"background:#f5f6fa;border:1px solid #d8dcec;border-radius:10px;padding:10px;margin-top:4px;margin-bottom:12px;"});
    cal.appendChild(el("div",{style:"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"},[
      el("button",{style:ST.navBtn+"width:28px;height:28px;font-size:16px;",onclick:function(){ pickerMonth.month--; if(pickerMonth.month<1){pickerMonth.month=12;pickerMonth.year--;} build(); }},["‹"]),
      el("span",{style:"font-size:13px;font-weight:700;color:#1e3a8a;"},[pickerMonth.year+"年 "+pickerMonth.month+"月"]),
      el("button",{style:ST.navBtn+"width:28px;height:28px;font-size:16px;",onclick:function(){ pickerMonth.month++; if(pickerMonth.month>12){pickerMonth.month=1;pickerMonth.year++;} build(); }},["›"])
    ]));
    var dowg=el("div",{style:"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;"});
    DAYS.forEach(function(dd){ dowg.appendChild(el("div",{style:"text-align:center;font-size:10px;color:#9ca3af;font-weight:700;"},[dd])); });
    cal.appendChild(dowg);
    var cg=el("div",{style:"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;"});
    cells.forEach(function(day){
      if(!day){ cg.appendChild(el("div",{})); return; }
      var ds=pickerMonth.year+"-"+pad(pickerMonth.month)+"-"+pad(day);
      var selected=selDates.indexOf(ds)>=0;
      cg.appendChild(el("button",{style:"aspect-ratio:1;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:"+(selected?"700":"400")+";background:"+(selected?"#4f46e5":"#fff")+";color:"+(selected?"#fff":"#1f2937")+";",
        onclick:function(){
          if(selected) v.candidateDates=v.candidateDates.filter(function(c){return c.date!==ds;});
          else { v.candidateDates.push({date:ds,memo:""}); v.candidateDates.sort(function(a,b){return a.date.localeCompare(b.date);}); }
          build();
        }},[String(day)]));
    });
    cal.appendChild(cg);
    body.push(cal);
    // 選択済み＋メモ
    if(v.candidateDates.length){
      var dl=el("div",{style:"display:flex;flex-direction:column;gap:6px;margin-bottom:12px;"});
      v.candidateDates.forEach(function(c){
        dl.appendChild(el("div",{style:"display:flex;align-items:center;gap:8px;background:#f5f6fa;border-radius:10px;padding:8px 10px;"},[
          el("span",{style:"font-size:13px;font-weight:700;color:#4f46e5;min-width:64px;"},[mmdd(c.date)+"（"+dowJP(c.date)+"）"]),
          el("input",{value:c.memo,placeholder:"時間帯メモ（例: 16時〜）",style:"flex:1;min-width:0;background:#fff;border:1px solid #d8dcec;border-radius:8px;color:#1f2937;padding:6px 10px;font-size:13px;box-sizing:border-box;",oninput:function(e){ c.memo=e.target.value; }}),
          el("button",{style:"background:none;border:none;color:#ef4444;font-size:16px;cursor:pointer;",onclick:function(){ v.candidateDates=v.candidateDates.filter(function(x){return x.date!==c.date;}); build(); }},["×"])
        ]));
      });
      body.push(dl);
    }
    // コマ
    var slotHead=el("div",{style:"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"},[
      el("span",{style:"font-size:13px;font-weight:700;color:#1f2937;"},["コマ ("+v.slots.length+")"]),
      el("button",{style:ST.ghostBtn+"padding:5px 12px;font-size:12px;",onclick:function(){ v.slots.push({status:"open",confirmedDate:""}); build(); }},["+ コマを追加"])
    ]);
    body.push(slotHead);
    v.slots.forEach(function(slot,idx){
      var sc=el("div",{style:"background:#f5f6fa;border-radius:10px;padding:10px;margin-bottom:8px;"});
      sc.appendChild(el("div",{style:"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;"},[
        el("span",{style:"font-size:13px;font-weight:700;color:#1f2937;"},["コマ"+(idx+1)]),
        v.slots.length>1?el("button",{style:"background:none;border:none;color:#ef4444;font-size:13px;cursor:pointer;",onclick:function(){ v.slots.splice(idx,1); build(); }},["削除"]):null
      ]));
      var stRow=el("div",{style:"display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;"});
      Object.keys(REQUEST_STATUS).forEach(function(key){
        var st=REQUEST_STATUS[key];
        stRow.appendChild(el("button",{style:"padding:5px 10px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:"+(slot.status===key?st.color:"#e5e7eb")+";color:"+(slot.status===key?"#fff":"#6b7280")+";",onclick:function(){ slot.status=key; build(); }},[st.label]));
      });
      sc.appendChild(stRow);
      sc.appendChild(el("label",{style:ST.label},["確定日（任意）"]));
      sc.appendChild(el("input",{type:"date",value:slot.confirmedDate||"",style:ST.input,onchange:function(e){ slot.confirmedDate=e.target.value; }}));
      sc.appendChild(el("label",{style:ST.label},["確定時間（任意）"]));
      sc.appendChild(el("div",{style:"display:flex;align-items:center;gap:8px;margin-top:4px;"},[
        el("div",{style:"flex:1;min-width:0;"},[timeSelect(slot.startTime||"16:00",function(val){slot.startTime=val;})]),
        el("span",{style:"color:#6b7280;"},["〜"]),
        el("div",{style:"flex:1;min-width:0;"},[timeSelect(slot.endTime||"17:30",function(val){slot.endTime=val;})])
      ]));
      body.push(sc);
    });
    body.push(field("メモ", el("input",{value:v.note,style:ST.input,placeholder:"科目・希望時間帯・代理の先生名など",oninput:function(e){ v.note=e.target.value; }})));
    body.push(el("button",{style:ST.addBtn+"width:100%;justify-content:center;margin-top:4px;",onclick:function(){
      // 確定日ありのコマをカレンダーに自動登録（未登録のもののみ）
      // 「自分で対応」→ 通常授業（生徒選択済みなら正しい生徒・区分・調整料で登録）
      // 「代理確定」→ 代わってもらう扱い（給料0・薄色）で登録
      var added=0;
      var pickedStudent = v.studentId!=null ? studentById(v.studentId) : null;
      (v.slots||[]).forEach(function(slot){
        if(!slot.confirmedDate || slot.sessionId) return;
        if(slot.status!=="mine" && slot.status!=="deputized") return;
        var sid=newId(S.data.sessions);
        var isHandoff = slot.status==="deputized"; // 代理確定=他の先生に渡す
        var rec;
        if(pickedStudent){
          rec={
            id:sid, studentId:pickedStudent.id, date:slot.confirmedDate,
            startTime:slot.startTime||"16:00", endTime:slot.endTime||"17:30",

            note:v.note||"", kind:"tutor", snapshotRate:getRate(pickedStudent), fixedAmount:0
          };
        } else {
          rec={
            id:sid, studentId:null, date:slot.confirmedDate,
            startTime:slot.startTime||"16:00", endTime:slot.endTime||"17:30",
            deputized:isHandoff, depName:(v.studentName||""), subType:"outside",
            note:v.note||"", kind:"tutor", snapshotRate:RATE_OUTSIDE, fixedAmount:0
          };
        }
        S.data.sessions.push(rec);
        slot.sessionId=sid; added++;
      });
      if(isNew){ v.id=newId(S.data.requests); S.data.requests.push(v); }
      else S.data.requests=S.data.requests.map(function(x){return x.id===v.id?v:x;});

    }},[isNew?"追加する":"保存する"]));
    S.modal=modalShell(isNew?"依頼を追加":"依頼を編集", body); render();

// ── バックアップ ──
function exportData(){
  S.data.lastBackup=new Date().toISOString();
  save();
  var data=Object.assign({}, S.data, { exportedAt:new Date().toISOString() });
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download="スケジューラーバックアップ_"+todayStr()+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function loadBackup(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data||!Array.isArray(data.sessions)){ alert("このファイルは読み込めませんでした（形式が違います）。"); return; }
      if(confirm("現在のデータを、このファイルの内容で置き換えます。よろしいですか？")){
        S.data={ sessions:data.sessions||[], students:data.students||[], otherEvents:data.otherEvents||[], requests:data.requests||[], manualIncome:data.manualIncome||{}, manualNet:data.manualNet||{}, unavailable:data.unavailable||[], templates:data.templates||[], lastBackup:data.lastBackup||null };
        save(); render(); alert("読み込みが完了しました。");
      }
    }catch(err){ alert("ファイルの読み込みに失敗しました。"); }
  };
  reader.readAsText(file);
}

// ── 起動 ──
function boot(){
  S.data=load();
  render();
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot);
else boot();
